name: Phase 2 Quality Gates

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bootstrap workspace packages
        run: npm run phase1:bootstrap

      - name: Run Phase 2 quality gates
        run: npm run phase2:quality:ci
