server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index GatewaySelector.html index.html;

    location / {
        try_files $uri $uri/ /GatewaySelector.html;
    }

    location = /runtime-config.production.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }
}

