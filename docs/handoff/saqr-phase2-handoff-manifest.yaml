  "deliveryOwnedItems": [
    {
      "area": "Workflow persistence and API exposure",
      "items": [
        "Provision durable workflow storage for definitions, runtime state, approvals, SLAs, and audit history.",
        "Mount the workflow API surface in the delivery-owned HTTP layer and preserve workflow-version and audit immutability semantics."
      ]
    },
    {
      "area": "Identity and actor resolution",
      "items": [
        "Wire a real actor directory and IdP to the workflow actor-resolution contract.",
        "Validate queues, roles, delegates, maker-checker rules, and committee routing with real identity data."
      ]
    },
    {
      "area": "Notification and remediation integrations",
      "items": [
        "Wire delivery-owned notification channels, escalation targets, and external remediation task integration.",
        "Add retry, monitoring, and failure handling around external approval and tasking delivery."
      ]
    },
    {
      "area": "Multi-entity data and authorization",
      "items": [
        "Load the client's real hierarchy and principal grants into the canonical Phase 2 models.",
        "Validate cross-entity access, reporting-plane behavior, and partition-local mutation rules in the target environment."
      ]
    },
    {
      "area": "Sovereign rollout tailoring",
      "items": [
        "Select the correct package profile for the client target topology.",
        "Replace placeholders, secrets, ingress values, registry values, and environment-specific settings in the chosen overlay set."
      ]
    },
    {
      "area": "Phase 1 baseline prerequisites",
      "items": [
        "Provision and validate the remaining Phase 1 runtime prerequisites such as shadow PostgreSQL, Kafka or Debezium, VMS connectivity, and platform controls where they remain in scope.",
        "Keep the demo environment separate from the implementation-ready deployment path."
      ]
    }
  ],
  "externalPrerequisites": [
    {
      "name": "Durable workflow persistence backend",
      "owner": "delivery team",
