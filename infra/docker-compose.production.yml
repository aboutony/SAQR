services:
  shield-ui:
    image: saqr/shield-ui:phase1
    build:
      context: ..
      dockerfile: apps/shield-ui/Dockerfile
    environment:
      SAQR_UI_API_BASE: ${SAQR_UI_API_BASE:-http://localhost:3001}
      SAQR_UI_AUTH_ENABLED: ${SAQR_UI_AUTH_ENABLED:-true}
      SAQR_UI_TOKEN_STORAGE_KEY: ${SAQR_UI_TOKEN_STORAGE_KEY:-saqr_api_bearer_token}
      SAQR_UI_RUNTIME_PROFILE: ${SAQR_UI_RUNTIME_PROFILE:-delivery-handoff}
      SAQR_UI_STATIC_BEARER_TOKEN: ${SAQR_UI_STATIC_BEARER_TOKEN:-}
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    image: saqr/api:phase1
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env.production.example
    ports:
      - "3001:3001"
    restart: unless-stopped

  evidence-vault:
    image: saqr/evidence-vault:phase1
    build:
      context: ..
      dockerfile: services/evidence-vault/Dockerfile
    env_file:
      - ../.env.production.example
    restart: unless-stopped

  nlp-interpreter:
    image: saqr/nlp-interpreter:phase1
    build:
      context: ..
      dockerfile: services/nlp-interpreter/Dockerfile
    env_file:
      - ../.env.production.example
    restart: unless-stopped

  cv-watchman:
    image: saqr/cv-watchman:phase1
    build:
      context: ..
      dockerfile: services/cv-watchman/Dockerfile
    env_file:
      - ../.env.production.example
    restart: unless-stopped

  sentinel-scrapers:
    image: saqr/sentinel-scrapers:phase1
    build:
      context: ..
      dockerfile: services/sentinel-scrapers/Dockerfile
    env_file:
      - ../.env.production.example
    restart: unless-stopped

networks:
  default:
    name: saqr-platform
