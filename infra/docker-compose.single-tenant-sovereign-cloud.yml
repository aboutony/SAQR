x-topology-env: &topology-env
  SAQR_PACKAGE_PROFILE: "single-tenant-sovereign-cloud"
  SAQR_TOPOLOGY_KEY: "single-tenant-sovereign-cloud"
  SAQR_TOPOLOGY_PATTERN: "single_tenant"
  SAQR_DEPLOYMENT_TARGET: "sovereign_cloud"
  SAQR_BOUNDARY_SCOPE: "tenant"
  SAQR_POLICY_MODEL: "saqr-reference-sovereign-policy"
  SAQR_DEFAULT_RESIDENCY_REQUIREMENT: "topology_boundary"
  SAQR_DEFAULT_ENCRYPTION_BOUNDARY: "tenant_managed_kms"
  SAQR_DEFAULT_REPORTING_CROSS_BORDER_MODE: "metadata_only"
  SAQR_ENTITY_PARTITION_MODE: "tenant"

services:
  shield-ui:
    environment:
      <<: *topology-env
  api:
    environment:
      <<: *topology-env
  evidence-vault:
    environment:
      <<: *topology-env
  nlp-interpreter:
    environment:
      <<: *topology-env
  cv-watchman:
    environment:
      <<: *topology-env
  sentinel-scrapers:
    environment:
      <<: *topology-env
