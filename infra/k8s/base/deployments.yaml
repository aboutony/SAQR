apiVersion: apps/v1
kind: Deployment
metadata:
  name: saqr-shield-ui
  namespace: saqr-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: saqr-shield-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: saqr-shield-ui
    spec:
      containers:
        - name: shield-ui
          image: saqr/shield-ui:phase1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: saqr-platform-config
            - secretRef:
                name: saqr-platform-secrets
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saqr-api
  namespace: saqr-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: saqr-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: saqr-api
    spec:
      containers:
        - name: api
          image: saqr/api:phase1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: saqr-platform-config
            - secretRef:
                name: saqr-platform-secrets
          ports:
            - containerPort: 3001
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
