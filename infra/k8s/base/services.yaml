apiVersion: v1
kind: Service
metadata:
  name: saqr-shield-ui
  namespace: saqr-platform
spec:
  selector:
    app.kubernetes.io/name: saqr-shield-ui
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: saqr-api
  namespace: saqr-platform
spec:
  selector:
    app.kubernetes.io/name: saqr-api
  ports:
    - name: http
      port: 3001
      targetPort: http

